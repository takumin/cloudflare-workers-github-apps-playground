---
name: CI
on:
  push:
permissions:
  contents: read
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Setup aqua
      uses: ./.github/actions/setup-aqua
    - name: Setup pnpm
      uses: ./.github/actions/setup-pnpm
    - name: Running Lint
      run: pnpm run lint
    - name: Running Test
      run: pnpm run test
