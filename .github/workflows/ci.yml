---
name: CI
on:
  push:
permissions:
  contents: read
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Setup aqua
      uses: ./.github/actions/setup-aqua
    - name: Setup pnpm
      uses: ./.github/actions/setup-pnpm
    - name: Running Lint
      run: pnpm run lint
    - name: Running Test
      run: pnpm run test
