---
name: CI
on:
  push:
permissions:
  contents: read
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        persist-credentials: false
    - name: Setup aqua
      uses: ./.github/actions/setup-aqua
    - name: Setup pnpm
      uses: ./.github/actions/setup-pnpm
    - name: Running Lint
      run: pnpm run lint
    - name: Running Test
      run: pnpm run test
